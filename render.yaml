services:
  - type: web
    name: kinakango-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # MySQL credentials — fill these in from Railway dashboard
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      # JWT secrets — click "Generate" on Render dashboard for each
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Your GitHub Pages URL
      - key: CLIENT_URL
        value: https://juneil-reedz.github.io
