services:
  - type: web
    name: kinakango-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Supabase PostgreSQL connection string
      # Format: postgresql://postgres.[project-ref]:[password]@aws-0-[region].pooler.supabase.com:6543/postgres
      - key: DATABASE_URL
        sync: false
      # JWT secrets — click "Generate" on Render dashboard for each
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Your GitHub Pages URL
      - key: CLIENT_URL
        value: https://juneil-reedz.github.io
