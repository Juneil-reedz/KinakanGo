<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA redirect: GitHub Pages returns 404 for deep links.
      // Store the full path and redirect to index.html.
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const base = '/KinakanGo';
      const redirectPath = path.startsWith(base) ? path.slice(base.length) : path;
      sessionStorage.setItem('spa_redirect', redirectPath + search + hash);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
