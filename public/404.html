<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA fix: store full path and redirect to index
      sessionStorage.setItem(
        'spa_redirect',
        window.location.pathname + window.location.search + window.location.hash
      );
      window.location.replace('/KinakanGo/');
    </script>
  </head>
  <body></body>
</html>
